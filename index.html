<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My App</title>
<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:#fff;overflow-x:hidden}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;
background:radial-gradient(circle,#333,#000)}
h1{font-size:3rem;color:#ffd54a;text-shadow:0 0 20px #ffd54a;animation:pulse 2s infinite}
.btn{padding:15px 30px;border-radius:30px;background:#ffd54a;color:#000;text-decoration:none;font-weight:bold}
.dot{position:fixed;width:6px;height:6px;border-radius:50%;background:#ffd54a;animation:fall linear infinite}
@keyframes pulse{50%{transform:scale(1.05)}}
@keyframes fall{from{transform:translateY(-10vh)}to{transform:translateY(110vh)}}
</style></head>
<body><div class="hero"><h1>My App</h1><p>Modern responsive landing page.</p>
<a class="btn" href="#">Download</a></div>
<script>
for(let i=0;i<60;i++){let d=document.createElement('div');d.className='dot';
d.style.left=Math.random()*100+'vw';d.style.top='-10vh';
d.style.animationDuration=(3+Math.random()*6)+'s';
d.style.animationDelay=(Math.random()*5)+'s';document.body.appendChild(d);}
</script></body></html>
